<h1>{{ portalName }}</h1>
<p>This portal allows students to view their profile, browse and enroll in courses, check grades, and receive notifications.</p>
<div class="stats-row">
  <span>Courses Available: {{ coursesCount }}</span> |
  <span>Enrolled: {{ enrolledCount }}</span> |
  <span>GPA: 3.8</span>
</div>

<div class="enrollment-section">
  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p *ngIf="message">{{ message }}</p>
</div>

<div class="search-section">
  <label for="search">Search: </label>
  <input id="search" [(ngModel)]="searchTerm">
  <p>Searching for: {{ searchTerm }}</p>
</div>
