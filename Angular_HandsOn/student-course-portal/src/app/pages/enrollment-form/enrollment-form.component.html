<h2>Student Enrollment Request</h2>

<div *ngIf="submitted" class="success-message">
  Enrollment request submitted successfully!
</div>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
  <div class="form-group">
    <label for="studentName">Student Name:</label>
    <input 
      type="text" 
      id="studentName" 
      name="studentName" 
      [(ngModel)]="studentName" 
      #nameCtrl="ngModel" 
      required 
      minlength="3" 
      class="form-control"
    >
    <div *ngIf="nameCtrl.touched && nameCtrl.errors" class="error-message">
      <span *ngIf="nameCtrl.errors['required']">Name is required.</span>
      <span *ngIf="nameCtrl.errors['minlength']">Name must be at least 3 characters.</span>
    </div>
  </div>

  <div class="form-group">
    <label for="studentEmail">Student Email:</label>
    <input 
      type="email" 
      id="studentEmail" 
      name="studentEmail" 
      [(ngModel)]="studentEmail" 
      #emailCtrl="ngModel" 
      required 
      email 
      class="form-control"
    >
    <div *ngIf="emailCtrl.touched && emailCtrl.errors" class="error-message">
      <span *ngIf="emailCtrl.errors['required']">Email is required.</span>
      <span *ngIf="emailCtrl.errors['email']">Invalid email format.</span>
    </div>
  </div>

  <div class="form-group">
    <label for="courseId">Course ID (Numeric):</label>
    <input 
      type="number" 
      id="courseId" 
      name="courseId" 
      [(ngModel)]="courseId" 
      #courseIdCtrl="ngModel" 
      required 
      class="form-control"
    >
    <div *ngIf="courseIdCtrl.touched && courseIdCtrl.errors" class="error-message">
      <span *ngIf="courseIdCtrl.errors['required']">Course ID is required.</span>
    </div>
  </div>

  <div class="form-group">
    <label for="preferredSemester">Preferred Semester:</label>
    <select 
      id="preferredSemester" 
      name="preferredSemester" 
      [(ngModel)]="preferredSemester" 
      class="form-control"
    >
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div class="form-group checkbox-group">
    <input 
      type="checkbox" 
      id="agreeToTerms" 
      name="agreeToTerms" 
      [(ngModel)]="agreeToTerms" 
      #agreeCtrl="ngModel" 
      required 
      class="form-check-input"
    >
    <label for="agreeToTerms">I agree to the terms and conditions</label>
    <div *ngIf="agreeCtrl.touched && agreeCtrl.errors" class="error-message">
      <span *ngIf="agreeCtrl.errors['required']">You must agree to the terms.</span>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" [disabled]="enrollForm.invalid" class="btn btn-primary">Submit</button>
    <button type="button" (click)="enrollForm.resetForm(); submitted = false;" class="btn btn-secondary">Reset</button>
  </div>
</form>
