<h2>Available Courses</h2>

<div *ngIf="isLoading; else listContent">
  <p>Loading courses...</p>
</div>

<ng-template #listContent>
  <div *ngIf="courses.length > 0; else noCourses" class="course-list-container">
    <app-course-card 
      *ngFor="let course of courses; let i = index; trackBy: trackByCourseId" 
      [course]="course" 
      (enrollRequested)="onEnroll($event)"
      (cardClicked)="onCardClick($event)">
    </app-course-card>
  </div>
</ng-template>

<ng-template #noCourses>
  <p>No courses available.</p>
</ng-template>

<p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
